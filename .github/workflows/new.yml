name: Build kmod IPKs

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "源码仓库"
        required: true
        type: string
        default: "https://github.com/padavanonly/immortalwrt-mt798x-6.6"
      commit:
        description: "源码 commit"
        required: true
        type: string
        default: "1ebae328ca"
      config_path:
        description: "配置文件路径"
        required: true
        type: string
        default: "config/128muboot.config"

permissions:
  contents: write

env:
  REPO_BRANCH: openwrt-24.10-6.6
  TZ: Asia/Shanghai
  CCACHE_DIR: /workdir/.ccache
  CCACHE_MAXSIZE: 2G

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3 python3-dev python3-setuptools rsync swig \
            unzip zlib1g-dev file wget curl libelf-dev ccache

      - name: Prepare workdir
        run: |
          sudo mkdir -p /workdir
          sudo chown "$USER":"$USER" /workdir

      - name: Clone source
        working-directory: /workdir
        run: |
          git clone --single-branch --branch "$REPO_BRANCH" \
            --filter=blob:none "${{ inputs.repo }}" openwrt
          cd openwrt
          if [ -n "${{ inputs.commit }}" ]; then
            git checkout "${{ inputs.commit }}"
          fi
          ln -sf /workdir/openwrt "$GITHUB_WORKSPACE/openwrt"

      - name: Update feeds
        working-directory: /workdir/openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load config and force modules
        working-directory: /workdir/openwrt
        run: |
          cp -f "$GITHUB_WORKSPACE/${{ inputs.config_path }}" .config
          make defconfig

          # 强制改成模块，确保生成独立 ipk
          sed -i \
            -e 's/^# CONFIG_KERNEL_XDP_SOCKETS is not set/CONFIG_KERNEL_XDP_SOCKETS=y/' \
            -e 's/^CONFIG_KERNEL_XDP_SOCKETS=.*/CONFIG_KERNEL_XDP_SOCKETS=y/' \
            -e 's/^# CONFIG_PACKAGE_kmod-sched-bpf is not set/CONFIG_PACKAGE_kmod-sched-bpf=m/' \
            -e 's/^CONFIG_PACKAGE_kmod-sched-bpf=.*/CONFIG_PACKAGE_kmod-sched-bpf=m/' \
            -e 's/^# CONFIG_PACKAGE_kmod-xdp-sockets-diag is not set/CONFIG_PACKAGE_kmod-xdp-sockets-diag=m/' \
            -e 's/^CONFIG_PACKAGE_kmod-xdp-sockets-diag=.*/CONFIG_PACKAGE_kmod-xdp-sockets-diag=m/' \
            .config

          echo "===== FINAL CONFIG CHECK ====="
          grep -E 'CONFIG_KERNEL_XDP_SOCKETS|CONFIG_PACKAGE_kmod-sched-bpf|CONFIG_PACKAGE_kmod-xdp-sockets-diag' .config || true

      - name: Build tools and toolchain
        working-directory: /workdir/openwrt
        run: |
          export FORCE_UNSAFE_CONFIGURE=1
          make tools/install -j$(nproc) V=s
          make toolchain/install -j$(nproc) V=s

      - name: Build kmod packages
        working-directory: /workdir/openwrt
        run: |
          export FORCE_UNSAFE_CONFIGURE=1
          make -j1 V=s package/kernel/linux/compile

      - name: Collect ipk artifacts
        run: |
          mkdir -p /workdir/output
          find /workdir/openwrt/bin -type f \( \
            -name "kmod-sched-bpf*.ipk" -o \
            -name "kmod-xdp-sockets-diag*.ipk" \
          \) -exec cp -v {} /workdir/output/ \;

          echo "Collected:"
          ls -lh /workdir/output || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kmod-ipk
          path: /workdir/output/*
          if-no-files-found: error
