name: Build kmod IPKs

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "源码仓库"
        required: true
        type: string
        default: "https://github.com/padavanonly/immortalwrt-mt798x-6.6"
      commit:
        description: "源码 commit"
        required: true
        type: string
        default: "1ebae328ca"
      config_path:
        description: "配置文件路径"
        required: true
        type: string
        default: "config/128muboot.config"

permissions:
  contents: write

env:
  TZ: Asia/Shanghai
  REPO_BRANCH: openwrt-24.10-6.6

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Init environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3 python3-dev python3-setuptools rsync swig \
            unzip zlib1g-dev file wget curl libelf-dev ccache

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Clone source
        run: |
          git clone --single-branch --branch "$REPO_BRANCH" \
            --filter=blob:none "${{ inputs.repo }}" openwrt
          cd openwrt
          git checkout "${{ inputs.commit }}"

      - name: Update feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load config and force kmods as modules
        working-directory: openwrt
        run: |
          cp -f "../${{ inputs.config_path }}" .config

          # 关键：必须是 m，才能生成独立 ipk
          sed -i \
            -e 's/^CONFIG_KERNEL_XDP_SOCKETS=.*/CONFIG_KERNEL_XDP_SOCKETS=y/' \
            -e 's/^CONFIG_PACKAGE_kmod-sched-bpf=.*/CONFIG_PACKAGE_kmod-sched-bpf=m/' \
            -e 's/^CONFIG_PACKAGE_kmod-xdp-sockets-diag=.*/CONFIG_PACKAGE_kmod-xdp-sockets-diag=m/' \
            .config

          make defconfig

          echo "===== CHECK CONFIG ====="
          grep -E "CONFIG_KERNEL_XDP_SOCKETS|CONFIG_PACKAGE_kmod-sched-bpf|CONFIG_PACKAGE_kmod-xdp-sockets-diag" .config || true

      - name: Build only the two kmod packages
        working-directory: openwrt
        run: |
          export FORCE_UNSAFE_CONFIGURE=1
          make -j1 V=s package/kernel/linux/compile

      - name: Collect target ipk files
        run: |
          mkdir -p firmware_collection
          find openwrt/bin/packages -type f \( \
            -name "kmod-sched-bpf*.ipk" -o \
            -name "kmod-xdp-sockets-diag*.ipk" \
          \) -exec cp -v {} firmware_collection/ \;

          echo "Collected files:"
          ls -lh firmware_collection || true

      - name: Upload IPK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kmod-ipk
          path: firmware_collection/*
          if-no-files-found: error
